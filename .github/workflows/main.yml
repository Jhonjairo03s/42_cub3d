name: 42 Deep QA Validator

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Validación de la Norma de 42
  norminette:
    name: Check Norminette
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Norminette
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install norminette
          
      - name: Run Norminette
        run: norminette

  # 2. Análisis Estático y Compilación Estricta
  build_and_analyze:
    name: Build & CppCheck
    runs-on: ubuntu-latest
    needs: norminette # Solo se ejecuta si pasa la norma
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
        
      - name: Run Static Analysis (cppcheck)
        # Busca bugs, variables no inicializadas y comportamientos indefinidos
        run: cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 .
        
      - name: Compile strictly
        # Tu Makefile debe incluir obligatoriamente -Wall -Wextra -Werror
        run: make

  # 3. Control de Fugas de Memoria (Leaks) y Comportamiento
  memory_leaks:
    name: Valgrind Memory Check
    runs-on: ubuntu-latest
    needs: build_and_analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
        
      - name: Compile for debugging
        # Compilamos con bandera -g para que Valgrind dé líneas exactas de error
        run: make CFLAGS="-Wall -Wextra -Werror -g"
        
      - name: Run Valgrind
        # REEMPLAZA './tu_ejecutable' y 'args' por tu programa real de 42
        # Falla el workflow si detecta un solo byte sin liberar
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   ./tu_ejecutable [pon_aqui_tus_argumentos_de_prueba]
